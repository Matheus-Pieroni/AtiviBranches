<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* SEM BACKGROUND-COLOR PRA VOCE!! >:P */
            color: #333;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: animacaoDoFundo;
            animation-duration: 3s;
            animation-iteration-count: infinite;
        }

        @keyframes animacaoDoFundo {
            0% {background-color: white}
            20% {background-color: red}
            40% {background-color: blue}
            60% {background-color: greenyellow}
            80% {background-color: yellow}
            100% {background-color: rgb(0, 0, 0);}
        }

        @keyframes animacaoDoTexto {
            0% {color: white}
            20% {color: red}
            40% {color: blue}
            60% {color: rgb(0, 255, 34)}
            80% {color: yellow}
            100% {color: rgb(106, 0, 255);}
        }

        @keyframes piaoDaCasaPropria {
            0% {transform: rotate(0deg); transform: rotateY(0deg);}
            33% {transform: rotateX(120deg ); transform: rotate(120deg);}
            66% {transform: rotateX(240deg); transform: rotateY(240deg);}
            88% {transform: rotateX(360deg); transform: rotateY(360deg);}
            100% {transform: rotateX(0deg); transform: rotateY(0deg);}
        }

        .dashboard-container {
            background-color: white; /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: piaoDaCasaPropria;
            animation-duration: 2.5s;
            animation-delay: 4s;
            animation-iteration-count: infinite;
        }

        h1 {
            animation: animacaoDoTexto;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            margin-bottom: 20px;
            animation: piaoDaCasaPropria;
            animation-duration: 2.5s;
            animation-delay: 0.7s;
            animation-iteration-count: infinite;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Dashboard Analítico</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">94.2%</span>
                <span class="card-label">Acurácia</span>
            </div>
            <div class="card">
                <span class="card-value">1.2s</span>
                <span class="card-label">Latência</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #999;">
            Status do Servidor: <span style="color: green;">● Online</span>
        </p>
    </div>

</body>
</html>
