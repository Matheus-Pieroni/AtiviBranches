<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
            background-color: #f0f2f5; /* Cor para alterar no modo noturno */
            color: #333;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        @keyframes fadeIn {
            from {opacity: 10%; transform: scale(200%);}
            to {opacity: 100%; transform: scale(100%);}
        }

        .dashboard-container { /* Bora fazer isso aparecer do nada */
            background-color: white; /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 50%;
            animation-name: fadeIn;
            animation-duration: 2.5s;
        }

        h1 {
            color: #007bff;
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Dashboard Analítico</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">94.2%</span>
                <span class="card-label">Acurácia</span>
            </div>
            <div class="card">
                <span class="card-value">1.2s</span>
                <span class="card-label">Latência</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #999;">
            Status do Servidor: <span style="color: green;">● Online</span>
        </p>
    </div>

</body>
</html>
