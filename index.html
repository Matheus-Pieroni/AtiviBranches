<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Comic Sans MS';
            /*background-image: url(https://i.pinimg.com/originals/ee/42/d9/ee42d91ece376e6847f6941b72269c76.gif); /* Cor para alterar no modo noturno */
            animation: mudarFundo;
            animation-duration: 60s;
            animation-iteration-count: infinite;
            background-size: 90% contain;
            color: #333;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: white; /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            animation: animacaoDoTexto;
            animation-duration: 4s;
            animation-iteration-count: infinite;
            margin-bottom: 20px;
        }

        @keyframes mudarFundo {
            0% {background-image: url(https://cdn.shopify.com/s/files/1/0344/6469/files/cat-gif-loop-wheel_grande.gif?v=1523982721);}
            20% {background-image: url(https://i.chzbgr.com/full/9204612608/h339C1D32/cat);}
            40% {background-image: url(https://www.whycatwhy.com/wp-content/uploads/2016/05/cat-playing-with-blanket.gif);}
            60% {background-image: url(https://i.pinimg.com/originals/ee/42/d9/ee42d91ece376e6847f6941b72269c76.gif);}
            80% {background-image: url(https://media.giphy.com/media/gKfNj8cYeGN63bLRkF/source.gif);}
            100% {background-image: url(https://cdn.shopify.com/s/files/1/0344/6469/files/cat-gif-loop-wheel_grande.gif?v=1523982721);}
        }

        @keyframes animacaoDoTexto {
            0% {color: white; transform: scale(135%)}
            20% {color: red; transform: scale(100%)}
            40% {color: blue; transform: scale(140%)}
            60% {color: rgb(0, 255, 34); transform: scale(90%)}
            80% {color: yellow; transform: scale(135%)}
            100% {color: rgb(106, 0, 255); transform: scale(100%)}
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
            animation: animacaoDoTexto;
            animation-duration: 4s;
            animation-iteration-count: infinite;
            margin-bottom: 20px;
        }

        .card-label {
            font-size: 14px;
            color: #666;
            animation: animacaoDoTexto;
            animation-duration: 4s;
            animation-iteration-count: infinite;
            margin-bottom: 20px;
        }

        p {
            margin-top: 25px; font-size: 12px; color: #999;
            animation: animacaoDoTexto;
            animation-duration: 4s;
            animation-iteration-count: infinite;
        }

        span {
            animation: animacaoDoTexto;
            animation-duration: 4s;
            animation-iteration-count: infinite;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Dashboard Analítico</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">94.2%</span>
                <span class="card-label">Acurácia</span>
            </div>
            <div class="card">
                <span class="card-value">1.2s</span>
                <span class="card-label">Latência</span>
            </div>
        </div>

        <p>
            Status do Servidor: <span>● Online</span>
        </p>
    </div>

</body>
</html>
